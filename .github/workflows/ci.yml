name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Sync (lockfile)
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Compile check
        run: uv run python -m compileall -q main.py malt_crm

      - name: Pytest (coverage)
        run: uv run pytest

      - name: Dead code (vulture)
        run: uv run vulture
